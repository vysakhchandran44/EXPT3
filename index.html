<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#f5f4e4">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>PharmaTrack - Stock Scanner</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Palette inspired by your image */
      --bg-creme: #f5f4e4;
      --white: #ffffff;
      --card-yellow: #fff2cc;
      --card-green: #d9ead3;
      --card-blue: #cfe2f3;
      --text-main: #1a1a1a;
      --text-muted: #7a7a7a;
      
      /* Status Colors */
      --green: #10b981;
      --orange: #f59e0b;
      --red: #ef4444;
      
      /* Sizing */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
      --nav-height: 75px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-creme);
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
    }

    /* App Container */
    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-top);
      position: relative;
    }

    /* Header */
    .header {
      height: 65px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
    }

    .menu-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--white);
      border: 1px solid rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    /* Main Content Area */
    .main {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: var(--white);
      margin: 0 10px;
      border-radius: 30px 30px 0 0;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.03);
    }

    .page {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      padding: 20px;
    }

    .page.active {
      display: flex;
    }

    /* History Cards */
    .history-card {
      background: var(--bg-creme);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      border: none;
      transition: transform 0.2s;
    }

    .history-card:active {
      transform: scale(0.98);
    }

    .product-name {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
    }

    /* Bottom Nav */
    .nav {
      height: var(--nav-height);
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding-bottom: var(--safe-bottom);
      border-top: 1px solid rgba(0,0,0,0.03);
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: var(--text-muted);
      border: none;
      background: none;
      font-size: 11px;
      font-weight: 500;
    }

    .nav-item.active {
      color: #000;
    }

    /* Black Circular Scan Button from image */
    .scan-fab {
      position: absolute;
      bottom: calc(var(--nav-height) + 15px);
      left: 50%;
      transform: translateX(-50%);
      width: 65px;
      height: 65px;
      border-radius: 50%;
      background: #000;
      border: none;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      z-index: 200;
    }

    /* Search Bar */
    .search-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .search-input {
      width: 100%;
      height: 50px;
      padding: 0 50px;
      border-radius: 25px;
      background: var(--bg-creme);
      border: none;
      font-size: 15px;
      outline: none;
    }

    /* Toast styling */
    .toast {
      background: #000;
      color: #fff;
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <span class="logo-text">PharmaTrack</span>
      </div>
      <button class="menu-btn" id="menuBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v8M8 12h8"/>
        </svg>
      </button>
    </header>

    <main class="main">
      <div class="page active" id="page-scan">
        <div class="search-wrapper">
          <input type="text" class="search-input" placeholder="Search files...">
        </div>
        <div id="scannerContainer" style="flex: 1; border-radius: 20px; overflow: hidden; background: #eee;">
          <video id="video-preview" style="width: 100%; height: 100%; object-fit: cover;"></video>
        </div>
      </div>

      <div class="page" id="page-history">
        <h2 style="margin-bottom: 15px;">Recent Scans</h2>
        <div class="history-list" id="historyList">
          </div>
      </div>
    </main>

    <button class="scan-fab" id="scanFab">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 12H3m9-9v18"/>
      </svg>
    </button>

    <nav class="nav">
      <button class="nav-item active" data-page="scan">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-item" data-page="history">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20v-6M6 20V10M18 20V4"/></svg>
        <span>Stats</span>
      </button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
